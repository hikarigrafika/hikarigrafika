<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hikari Grafika</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#fff;
  color:#333;
  scroll-behavior:smooth;
  overflow-x:hidden;
}

/* SIMPLE & CLEAN */
section{
  padding:80px 20px;
  max-width:1200px;
  margin:auto;
  border-bottom:1px solid #eee;
}

h1,h2{color:#2563eb;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .3s ease;
}
.card img{width:100%;display:block;}
.card:hover{transform:translateY(-6px);}

/* HERO */
.hero{
  text-align:center;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#2563eb;
  z-index:999;
}

/* MENU */
#menu{
  position:fixed;
  right:-100%;
  top:0;
  width:70%;
  height:100%;
  background:#fff;
  padding:30px;
  transition:0.3s;
}

/* CAROUSEL */
.carousel-container{
  overflow:hidden;
  max-width:700px;
  margin:30px auto;
}
.carousel-track{
  display:flex;
  transition:transform .4s ease;
}
.carousel-item{
  min-width:100%;
}
.carousel-item img{
  width:100%;
  border-radius:16px;
}

/* BUTTON */
.carousel-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* DOT */
.carousel-dots{
  text-align:center;
}
.carousel-dots span{
  display:inline-block;
  width:10px;
  height:10px;
  background:#ccc;
  margin:5px;
  border-radius:50%;
}
.carousel-dots .active{
  background:#2563eb;
}
</style>
</head>

<body>

<nav id="navbar">
  <img src="logo.png" height="35">
  <div id="menuBtn">☰</div>
</nav>

<div id="menu">
  <a href="#">Home</a><br>
  <a href="#about">Service</a><br>
  <a href="#portfolio">Portofolio</a>
</div>

<section class="hero">
  <h1 id="typeText"></h1>
</section>

<section id="portfolio">
  <h2>Sosmed Feed</h2>

  <div class="grid">
    <div class="card"><img src="spaghetti.jpeg"></div>
    <div class="card"><img src="fried-chicken.jpeg"></div>
  </div>

  <div class="carousel-container">
    <div class="carousel-track" id="track">
      <div class="carousel-item"><img src="gambarkesatu.jpeg"></div>
      <div class="carousel-item"><img src="feed2.jpeg"></div>
    </div>
  </div>

  <div class="carousel-dots" id="dots"></div>
</section>

<script>
/* ===== TYPEWRITER ===== */
const text = "Solusi kebutuhan branding mu";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("typeText").innerHTML += text[i++];
    setTimeout(typing, 40);
  }
}
typing();

/* ===== MENU ===== */
const menuBtn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

menuBtn.onclick = () => {
  menu.style.right = menu.style.right === "0px" ? "-100%" : "0";
};

/* ===== NAVBAR SCROLL (OPTIMIZED) ===== */
let lastScroll = 0;
window.addEventListener("scroll", () => {
  requestAnimationFrame(() => {
    let current = window.pageYOffset;
    document.getElementById("navbar").style.top =
      current > lastScroll ? "-80px" : "0";
    lastScroll = current;
  });
});

/* ===== CAROUSEL ===== */
let index = 0;
const track = document.getElementById("track");
const slides = document.querySelectorAll(".carousel-item");
const dotsContainer = document.getElementById("dots");

slides.forEach((_, i) => {
  const dot = document.createElement("span");
  dot.onclick = () => goTo(i);
  dotsContainer.appendChild(dot);
});

const dots = dotsContainer.children;

function update(){
  track.style.transform = translateX(-${index * 100}%);
  [...dots].forEach(d => d.classList.remove("active"));
  dots[index].classList.add("active");
}

function goTo(i){
  index = i;
  update();
}

/* AUTO SLIDE (FIX: cuma 1x) */
setInterval(() => {
  index = (index + 1) % slides.length;
  update();
}, 3000);

update();
</script>

</body>
</html>

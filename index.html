<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {font-family:'Poppins',sans-serif;margin:0;background:#fff;color:#333;}
h1,h2{color:#2563eb;}
section{padding:80px 20px;max-width:1200px;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{border-radius:16px;overflow:hidden;cursor:pointer;transition:.3s;}
.card img{width:100%;display:block;}
.card:hover{transform:scale(1.05);}
.btn{background:#2563eb;color:#fff;padding:12px 20px;border-radius:8px;text-decoration:none;display:inline-block;margin-top:15px;}
.hero{text-align:center;height:100vh;display:flex;flex-direction:column;justify-content:center;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);justify-content:center;align-items:center;}
.modal img{max-width:90%;border-radius:12px;}
.close{position:absolute;top:20px;right:30px;color:#fff;font-size:30px;cursor:pointer;}
.wa{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;padding:15px;border-radius:50%;text-decoration:none;font-size:20px;}
</style>
</head>

<body>

<section class="hero">
<h1 data-aos="fade-up">Creative Graphic Designer</h1>
<p data-aos="fade-up" data-aos-delay="200">Saya adalah desainer grafis yang fokus pada branding dan social media feed.</p>
<a href="#portfolio" class="btn" data-aos="fade-up" data-aos-delay="400">Lihat Portofolio</a>
</section>

<section id="about">
<h2 data-aos="fade-up">About Me</h2>
<p data-aos="fade-up" data-aos-delay="200">Nama saya Egi Muhammad Nur, pengalaman lebih dari 3 tahun dalam dunia desain.</p>
</section>

<section id="portfolio">
<h2 data-aos="fade-up">Sosmed Feed</h2>
<div class="grid">
<div class="card" onclick="openModal('spaghetti.jpeg')" data-aos="zoom-in"><img src="spaghetti.jpeg"></div>
<div class="card" onclick="openModal('fried-chicken.jpeg')" data-aos="zoom-in"><img src="fried-chicken.jpeg"></div>
<div class="card" onclick="openModal('kebab.jpeg')" data-aos="zoom-in"><img src="kebab.jpeg"></div>
</div>
</section>

<section>
<h2>Poster</h2>
<div class="grid">
<div class="card">Coming Soon</div>
</div>
</section>

<section>
<h2>Logo</h2>
<div class="grid">
<div class="card" onclick="openModal('varo-logo.png')"><img src="varo-logo.png"></div>
<div class="card" onclick="openModal('tb-gemilang.png')"><img src="tb-gemilang.png"></div>
</div>
</section>

<div id="modal" class="modal" onclick="closeModal()">
<span class="close">&times;</span>
<img id="modalImg">
</div>

<a href="https://wa.me/6283874614886" class="wa">💬</a>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();

function openModal(src){
 document.getElementById('modal').style.display='flex';
 document.getElementById('modalImg').src=src;
}
function closeModal(){
 document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
